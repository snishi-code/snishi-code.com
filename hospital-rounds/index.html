<!doctype html>
<html lang="ja">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>回診</title>
  <link rel="manifest" href="/hospital-rounds/manifest.json" />
  <meta name="theme-color" content="#2563eb" />
  <link rel="apple-touch-icon" href="/hospital-rounds/icons/apple-touch-icon.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="回診" />
</head>

<body>
  <header>
    <div class="headerInner">
      <div class="appTitle">
        <input type="text" id="appTitleInput" class="appTitleInput" value="回診" />
      </div>
      <div class="chipRow">
        <button class="secondary" id="headerHelpBtn" type="button" title="説明書" aria-label="説明書">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </button>
        <button class="secondary" id="headerSettingsBtn" type="button" title="設定" aria-label="設定">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
        <button class="secondary" id="headerMemoBtn" type="button" title="メモ" aria-label="メモ">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        </button>
        <button class="secondary" id="headerSharedBtn" type="button" title="共有" aria-label="共有">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        </button>
        <button class="secondary" id="headerHomeBtn" type="button" title="ホーム" aria-label="ホーム">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="container">
    <!-- Home view -->
    <section class="view active" id="homeView" aria-label="ホーム画面">
      <div class="chipRow" style="margin-bottom: 12px;">
        <button class="danger" id="resetBtn" type="button">全消去</button>
        <button class="secondary" id="clearAllBtn" type="button" title="全患者クリア" aria-label="全患者クリア">クリア</button>
        <button class="secondary" id="settingsImportBtn" type="button" title="取込" aria-label="取込" style="margin-left:8px;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
        <button class="secondary" id="settingsExportBtn" type="button" title="保存" aria-label="保存">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </button>
      </div>
      <div class="grid" id="homeGrid"></div>
    </section>

    <!-- Memo view -->
    <section class="view" id="memoView" aria-label="メモ一覧">
      <div class="detailTop noprint">
        <div style="display:flex;align-items:center;gap:6px;">
          <div class="detailTitle">メモ</div>
          <button class="iconBtn" id="memoEditBtn" type="button" title="編集" aria-label="編集">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          </button>
        </div>
        <div class="detailTopActions">
          <button class="iconBtn" id="memoPrintBtn" type="button" title="印刷" aria-label="印刷">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          </button>
        </div>
      </div>
      <div class="memoScroll" id="memoListHost"></div>
    </section>

    <!-- Shared view -->
    <section class="view" id="sharedView" aria-label="共有一覧">
      <div class="detailTop noprint">
        <div style="display:flex;align-items:center;gap:6px;">
          <div class="detailTitle">共有</div>
          <button class="iconBtn" id="sharedEditBtn" type="button" title="編集" aria-label="編集">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          </button>
        </div>
        <div class="detailTopActions">
          <button class="iconBtn" id="sharedShowQrBtn" type="button" title="QR表示" aria-label="QR表示">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="5" y="5" width="3" height="3" fill="currentColor"/><rect x="16" y="5" width="3" height="3" fill="currentColor"/><rect x="5" y="16" width="3" height="3" fill="currentColor"/><rect x="14" y="14" width="3" height="3" fill="currentColor"/><rect x="19" y="14" width="2" height="2" fill="currentColor"/><rect x="14" y="19" width="2" height="2" fill="currentColor"/><rect x="19" y="19" width="2" height="2" fill="currentColor"/></svg>
          </button>
          <button class="iconBtn" id="sharedPrintBtn" type="button" title="印刷" aria-label="印刷">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          </button>
        </div>
      </div>
      <div class="card" id="sharedPasteCard" style="margin-top: 14px;">
        <div class="cardHead" id="sharedPasteToggle" style="cursor:pointer;user-select:none;">
          <div class="label">受信メモ</div>
          <button class="iconBtn" type="button" id="sharedPasteChevronBtn" aria-label="展開/折りたたみ" style="transition:transform 0.2s;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
        </div>
        <div class="cardBody" id="sharedPasteBody" style="display:none;">
          <textarea id="sharedPasteArea" style="min-height: 160px;"></textarea>
        </div>
      </div>
      <div class="memoScroll" id="sharedListHost"></div>
    </section>

    <!-- Shared QR view -->
    <section class="view" id="sharedQrView" aria-label="共有QR表示">
      <div class="detailTop noprint">
        <div class="detailTitle">共有QR</div>
        <div class="detailTopActions">
          <button class="iconBtn" id="sharedQrCloseBtn" type="button" title="閉じる" aria-label="閉じる">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>
      <div class="card" style="margin-top: 14px;">
        <div class="cardHead">
          <div class="label">QRコード</div>
          <div class="qrHint"><span class="mono" id="sharedQrPageMeta"></span></div>
        </div>
        <div class="cardBody" style="text-align:center;">
          <div class="qrHint" style="margin-bottom:8px">
            複数QRの場合は順番に読み取ってください。
            <div style="display:flex;gap:8px;justify-content:center;margin-top:8px">
              <button class="secondary" id="sharedQrPrevBtn" type="button" title="前" aria-label="前">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
              </button>
              <button class="secondary" id="sharedQrNextBtn" type="button" title="次" aria-label="次">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
              </button>
            </div>
          </div>
          <canvas id="sharedQrCanvas" width="800" height="800"></canvas>
        </div>
      </div>
    </section>

    <!-- Overview view -->
    <section class="view" id="overviewView" aria-label="総覧">
      <div class="detailTop noprint">
        <div class="detailTitle">総覧</div>
        <div class="detailTopActions">
          <button class="iconBtn" id="overviewPrintBtn" type="button" title="印刷" aria-label="印刷">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          </button>
        </div>
      </div>
      <div class="overviewPrintHead" aria-hidden="true">回診 — 総覧</div>
      <div class="overviewTableWrap">
        <table class="overviewTbl" id="overviewTable"></table>
      </div>
    </section>

    <!-- Settings view -->
    <section class="view" id="settingsView" aria-label="設定画面">
      <div class="detailTop noprint">
        <div class="detailTitle">設定</div>
        <div class="detailTopActions">
          <input type="file" id="settingsImportFile" accept=".json" style="display:none" />
          <button class="iconBtn" id="settingsHelpBtn" type="button" title="説明書" aria-label="説明書">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          </button>
          <button class="secondary" id="overviewBtn" type="button">総覧</button>
          <button class="iconBtn" id="settingsPrintBtn" type="button" title="印刷" aria-label="印刷">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          </button>
        </div>
      </div>

      <div class="card qrWrap" id="docsQrWrap">
        <div class="cardHead">
          <div class="label">説明書 QR</div>
          <div class="qrHint">カメラで読み取ってください</div>
        </div>
        <canvas id="docsQrCanvas"></canvas>
      </div>

      <div class="card">
        <div class="cardHead">
          <div class="label">S</div>
          <div class="qrHint">空欄なら未入力時も空欄になります</div>
        </div>
        <div class="cardBody">
          <textarea id="setSDefault" placeholder="例) 変わりありません"></textarea>
        </div>
      </div>

      <div class="card">
        <div class="cardHead">
          <div class="label">O</div>
          <div class="qrHint">＋で項目追加</div>
        </div>
        <div class="cardBody">
          <div id="setORules"></div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">
            <button class="secondary" id="addORuleBtn" type="button">＋ 追加</button>
            <button class="secondary" id="resetORulesBtn" type="button">初期化</button>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="cardHead">
          <div class="label">A</div>
          <div class="qrHint">未入力時にこの文言を入れます</div>
        </div>
        <div class="cardBody">
          <textarea id="setADefault" placeholder="例) 著変なし" style="min-height:90px"></textarea>
        </div>
      </div>

      <div class="card">
        <div class="cardHead">
          <div class="label">P</div>
          <div class="qrHint">未入力時にこの文言を入れます</div>
        </div>
        <div class="cardBody">
          <textarea id="setPDefault" placeholder="例) 現行加療継続" style="min-height:90px"></textarea>
        </div>
      </div>

      <div class="card">
        <div class="cardHead">
          <div class="label">クリア対象</div>
          <div class="qrHint">クリアボタンで消去する項目</div>
        </div>
        <div class="cardBody" id="clearTargetsBody"></div>
      </div>
    </section>

    <!-- Detail view -->
    <section class="view" id="detailView" aria-label="詳細入力画面">
      <div class="detailTop noprint">
        <input type="text" class="detailTitle" id="detailTitle"
          style="border:none; background:transparent; outline:none; margin:0; padding:2px; width:100%; max-width:200px; color:inherit; font-family:inherit;"
          value="—" />
        <div class="detailTopActions">
          <button class="secondary" id="clearBtn" type="button">クリア</button>
          <div class="statusPick" aria-label="ステータス選択">
            <button class="statusBtn yellow" id="topStatusYellowBtn" type="button" title="保留（黄）" aria-label="保留（黄）"></button>
            <button class="statusBtn green" id="topStatusGreenBtn" type="button" title="済（緑）" aria-label="済（緑）"></button>
            <button class="statusBtn gray" id="topStatusGrayBtn" type="button" title="終了（濃いグレー）" aria-label="終了（濃いグレー）"></button>
          </div>
        </div>
      </div>

      <div class="card qrWrap" id="qrWrap">
        <div class="cardHead">
          <div class="label">QRコード</div>
          <div class="qrHint"><span class="mono" id="qrPageMeta"></span></div>
        </div>
        <div class="cardBody">
          <div class="qrHint">
            <div class="mono" id="qrTextPreview" style="margin-top:6px;word-break:break-all;white-space:pre-wrap"></div>
            <div id="qrError" class="qrHint dangerText" style="margin-top:6px;display:none"></div>
          </div>
        </div>
        <div
          style="display:flex;gap:10px;align-items:center;justify-content:space-between;padding:10px 12px;border-top:1px solid var(--line);background:#fafafa;flex-wrap:wrap">
          <div class="qrHint">複数QRの場合は順番に読み取ってください。</div>
          <div style="display:flex;gap:8px;align-items:center">
            <button class="secondary" id="qrPrevBtn" type="button" title="前" aria-label="前">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <button class="secondary" id="qrNextBtn" type="button" title="次" aria-label="次">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>
        </div>
        <canvas id="qrCanvas" width="800" height="800"></canvas>
      </div>

      <div class="card" id="detailMemoCard">
        <div class="cardHead">
          <div class="label" style="display:flex;align-items:center;gap:5px;">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            メモ
          </div>
        </div>
        <div class="cardBody">
          <textarea id="detailMemoText" style="min-height:60px"></textarea>
        </div>
      </div>

      <div class="card">
        <div class="cardHead">
          <div class="label">S</div>
        </div>
        <div class="cardBody">
          <textarea id="sText"></textarea>
        </div>
      </div>

      <div class="card">
        <div class="cardHead">
          <div class="label">O</div>
        </div>
        <div class="cardBody">
          <div class="formGrid two"
            style="margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--line);">
            <div>
              <label>SpO2 (％)</label>
              <div style="display:flex; align-items:center; gap:8px; margin-top:4px;">
                <input type="number" id="vitalSpo2" class="settingsInp">
                <input type="text" id="vitalSpo2Memo" class="settingsInp">
              </div>
            </div>
            <div>
              <label>呼吸数 (回)</label>
              <input type="number" id="vitalRr" class="settingsInp" style="margin-top:4px;">
            </div>
            <div>
              <label>血圧 (mmHg)</label>
              <div style="display:flex; align-items:center; gap:8px; margin-top:4px;">
                <input type="number" id="vitalBpSys" class="settingsInp">
                <span>/</span>
                <input type="number" id="vitalBpDia" class="settingsInp">
              </div>
            </div>
            <div>
              <label>脈拍 (回)</label>
              <input type="number" id="vitalPr" class="settingsInp" style="margin-top:4px;">
            </div>
            <div>
              <label>体温 (℃)</label>
              <input type="number" step="0.1" id="vitalBt" class="settingsInp" style="margin-top:4px;">
            </div>
          </div>
          <div id="oList"></div>
          <div style="margin-top:12px">
            <textarea id="oFreeText"></textarea>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="cardHead">
          <div class="label">A</div>
        </div>
        <div class="cardBody">
          <textarea id="aText" style="min-height:90px"></textarea>
        </div>
      </div>

      <div class="card">
        <div class="cardHead">
          <div class="label">P</div>
        </div>
        <div class="cardBody">
          <textarea id="pText" style="min-height:90px"></textarea>
        </div>
      </div>

      <div class="card">
        <div class="cardBody" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
          <button class="secondary" id="clearBtnBottom" type="button">クリア</button>
          <div class="statusPick" aria-label="ステータス選択">
            <button class="statusBtn yellow" id="statusYellowBtn" type="button" title="保留（黄）"
              aria-label="保留（黄）"></button>
            <button class="statusBtn green" id="statusGreenBtn" type="button" title="済（緑）" aria-label="済（緑）"></button>
            <button class="statusBtn gray" id="statusGrayBtn" type="button" title="終了（濃いグレー）"
              aria-label="終了（濃いグレー）"></button>
          </div>
        </div>
      </div>

      <div class="card" id="detailSharedCard">
        <div class="cardHead">
          <div class="label" style="display:flex;align-items:center;gap:5px;">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            共有
          </div>
        </div>
        <div class="cardBody">
          <textarea id="detailSharedText" style="min-height:90px"></textarea>
        </div>
      </div>

      <div class="qrHint" style="margin-top:10px">
        保存キー: <span class="mono" id="storageKeyLabel"></span>
      </div>
    </section>

    <div class="popupMenuOverlay" id="actionMenuOverlay">
      <div class="popupMenu">
        <div class="popupTitle" id="actionMenuTitle">患者の操作</div>
        <button class="secondary" id="actionAdd1Btn">1人追加（下へ）</button>
        <button class="secondary" id="actionAdd5Btn">5人追加（下へ）</button>
        <button class="danger" id="actionDeleteBtn">削除</button>
        <div style="height:12px;"></div>
        <button class="secondary" id="actionCancelBtn">キャンセル</button>
      </div>
    </div>

    <div class="popupMenuOverlay" id="importActionOverlay">
      <div class="popupMenu">
        <div class="popupTitle">データ取込</div>
        <div style="font-size: 14px; margin-bottom: 15px; color: #333; line-height: 1.4;">現在のデータが存在します。<br>どのように取り込みますか？</div>
        <button class="danger" id="importOverwriteBtn">上書き（現在のデータを消去）</button>
        <button class="primary" id="importAppendBtn">追記（差分を追加）</button>
        <div style="height:12px;"></div>
        <button class="secondary" id="importCancelBtn">キャンセル</button>
      </div>
    </div>
  </main>

      navigator.serviceWorker.register('/hospital-rounds/sw.js', { scope: '/hospital-rounds/' });
